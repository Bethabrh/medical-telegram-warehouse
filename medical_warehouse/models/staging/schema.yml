version: 2

models:
  - name: stg_telegram_messages
    description: "Cleaned and standardized telegram messages from raw data lake"
    columns:
      - name: message_id
        description: "Unique identifier for each message"
        tests:
          - not_null
      - name: channel_username
        description: "Telegram channel username"
        tests:
          - not_null
      - name: message_date
        description: "Timestamp of the message"
        tests:
          - not_null
      - name: views
        description: "Number of views on the message"
        tests:
          - not_null